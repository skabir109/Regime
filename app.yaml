name: regime
services:
  - name: regime-api
    github:
      repo: your-repo/regime
      branch: main
      deploy_on_push: true
    source_dir: backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}
      - key: DIRECT_URL
        scope: RUN_TIME
        value: ${DIRECT_URL}
      - key: LLM_API_KEY
        scope: RUN_TIME
        value: ${LLM_API_KEY}
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  - name: regime-web
    github:
      repo: your-repo/regime
      branch: main
      deploy_on_push: true
    source_dir: frontend
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${regime-api.PUBLIC_URL}
    build_command: npm run build
    run_command: npm run start
