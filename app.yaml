name: regime
services:
  - name: regime-api
    github:
      repo: your-repo/regime
      branch: main
      deploy_on_push: true
    source_dir: backend
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}
      - key: DIRECT_URL
        scope: RUN_TIME
        value: ${DIRECT_URL}
      - key: APP_ENV
        scope: RUN_TIME
        value: production
      - key: AUTO_INIT_DB
        scope: RUN_TIME
        value: "false"
      - key: FRONTEND_ORIGIN
        scope: RUN_TIME
        value: ${regime-web.PUBLIC_URL}
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${regime-web.PUBLIC_URL}
      - key: REGIME_SESSION_SECURE
        scope: RUN_TIME
        value: "true"
      - key: REGIME_SESSION_SAMESITE
        scope: RUN_TIME
        value: strict
      - key: LLM_API_KEY
        scope: RUN_TIME
        value: ${LLM_API_KEY}
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    run_command: uvicorn app.main:app --host 0.0.0.0 --port ${PORT} --workers 1

  - name: regime-web
    github:
      repo: your-repo/regime
      branch: main
      deploy_on_push: true
    source_dir: frontend
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${regime-api.PUBLIC_URL}
      - key: API_BASE_URL
        scope: RUN_TIME
        value: ${regime-api.PUBLIC_URL}
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    build_command: npm run build
    run_command: npm run start -- -H 0.0.0.0 -p ${PORT}
